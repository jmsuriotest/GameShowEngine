<!DOCTYPE html><html><head><meta charset='utf-8'><title>Guess The Logo</title><link rel='stylesheet' href='css/style.css'></head>
<body>
<div id="app" class="theme-default">
	<header>
		<h1 id="gameTitle">🎯 Guessing Game</h1>
	</header>
		<section id="gameHeader">
			<div class="status-row">
				<span id="questionText"></span>
				<span id="playerCount"></span>
			</div>
			<div class="bar">
				<div class="fill" id="progressBar"></div>
			</div>
		</section>
<div id="setupScreen" class=card>
	<div class="setup-row">
		<label>Game</label>
		<select id="packSelect"></select>
	</div>

	<div id="packInfo" class="pack-info">
		<h3 id="packDescription"></h3>
		<div class="pack-meta">
			<span>
				Version:
				<strong id="packVersion"></strong>
			</span>
			<span>
				Questions:
				<strong id="packQuestions"></strong>
			</span>
			<span>
				Author:
				<strong id="packAuthor"></strong>
			</span>
		</div>
	</div>
	<form id="setupForm">
		Players
		<input id=pcount type=number value=6>
		<button type="button" id="createPlayersBtn">Create</button>
		<div id=plist>
		</div>
		<button type="submit">Start</button>
	</form>
</div>

<main id="gameScreen">

	<div class="game-layout">

		<section class="left-panel">
            <div class="logo-stage">

                <div class="card">

                    <h2>Guess</h2>
					<div class="image-container">
						<img id="guessImage" class="logo-image">
					</div>

                </div>

                <div class="card reveal-card hidden" id="reveal">

                    <h2>Answer</h2>
					<div class="image-container">
						<img id="answerImage" class="logo-image">
					</div>
                    <h3 id="answerText"></h3>

                </div>

            </div>
		</section>

		<aside class="right-panel">

			<div class="panel-title">

				🏆 Scoreboard

			</div>

			<div id="scoreContainer"></div>

		</aside>
	</div>
	<div class="host-controls">
		<div class="button-bar">
			<div class="left-controls">
				<button class="btn-secondary" id="prevBtn">
					◀ Previous
				</button>
				<button class="btn-success" id="revealBtn">
					👁 Reveal
				</button>
				<button class="btn-primary" id="nextBtn">
					Next ▶
				</button>
			</div>
			<div class="right-controls">
				<button class="btn-secondary" id="settingsBtn">
					⚙ Settings
				</button>
				<button class="btn-danger" id="restartBtn">
					Restart
				</button>
				<button class="btn-secondary" id="fullscreenBtn">
					⛶ Fullscreen
				</button>
			</div>
		</div>
	</div>

</main>
</div>
    <div id="gameOverOverlay" class="hidden">
        <div class="overlay-content">
            <div class="overlay-icon">
                🏁
            </div>
            <h2>Final Round Complete</h2>
            <p>Calculating Final Scores...</p>
            <div class="overlay-loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    <canvas id="confettiCanvas" class="hidden"></canvas>
	<div id="winnerScreen" class="hidden">
		<div class="winner-container">
			<h1 id="winnerTitle">
				🏆 GAME OVER
			</h1>
			<div id="podium"></div>
			<div id="winnerStats"></div>
			<button onclick="restartGame()">
				Play Again
			</button>
		</div>
	</div>
	<div id="settingsModal" class="modal hidden">
		<div class="modal-content">
			<div class="modal-header">
				<h2>⚙ Settings</h2>
				<button id="closeSettingsBtn">✕</button>
			</div>
			<div class="modal-body">
				<div class="setting-row">
					<label>
						<input type="checkbox" id="shuffleQuestions">
						Shuffle Questions
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input type="checkbox" id="revealAnimation">
						Reveal Animation
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input type="checkbox" id="showProgressBar">
						Show Progress Bar
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input
								id="soundEnabled"
								type="checkbox">
						Enable Sounds
					</label>
				</div>
				<div class="setting-row">
					<label>
						Points Per Correct Answer
					</label>
					<input
							id="pointsPerCorrect"
							type="number"
							min="1"
							max="100"
							value="5">
				</div>
			</div>
			<div class="modal-footer">
				<button id="saveSettingsBtn">
					Save
				</button>
			</div>
		</div>
	</div>
<script src="js/packManager.js"></script>
<script src="gamepacks/logo-pack.js"></script>
<script src="gamepacks/emoji-movie-pack.js"></script>
<script src="gamepacks/pokemon-pack.js"></script>
<script src="js/state.js"></script>
<script src="js/settings.js"></script>
<script src="js/sound.js"></script>
<script src="js/scoreboard.js"></script>
<script src="js/podium.js"></script>
<script src="js/game.js"></script>
<script src="js/keyboard.js"></script>
<script src="js/confetti.js"></script>
<script src="js/script.js"></script>
<footer>
	Version 1.4.1.3
</footer>
</body></html>
