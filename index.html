<!DOCTYPE html>
<html>
<head>
	<meta charset='utf-8'>
	<meta name="theme-color" content="#07131F" id="themeColor">
	<title>Guessing Game</title>
	<link
			id="favicon"
			rel="icon"
			type="image/gif"
			href="images/icons/guess.gif">
	<link rel='stylesheet' href='css/style.css'>
	<link rel="stylesheet" href="themes/dark.css">
	<link rel="stylesheet" href="themes/neon.css">
	<link rel="stylesheet" href="themes/christmas.css">
	<link rel="stylesheet" href="themes/halloween.css">
</head>
<body>
<div id="app" class="theme-default">
	<header>

		<div class="header-top">

			<h1 id="gameTitle">
				🎯 Guess The Logo
			</h1>
			<div class="header-buttons">
				<button id="settingsBtn" class="icon-button">
					⚙
				</button>
				<button id="fullscreenBtn" class="icon-button">
					⛶
				</button>
			</div>
		</div>
	</header>
	<section id="gameHeader">
		<div class="bar">
			<div class="fill" id="progressBar"></div>
		</div>
	</section>
	<section id="hostDashboard" class="dashboard">

		<div class="dashboard-item">
			<span class="label">Game</span>
			<span id="dashboardPack"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Theme</span>
			<span id="dashboardTheme"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Players</span>
			<span id="dashboardPlayers"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Question</span>
			<span id="dashboardQuestion"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Reveal</span>
			<span id="dashboardReveal"></span>
		</div>
		<div class="dashboard-item">
			<span class="label">Leader</span>
			<span id="dashboardLeader"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Progress</span>
			<span id="dashboardProgress"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Sound</span>
			<span id="dashboardSound"></span>
		</div>

		<div class="dashboard-item">
			<span class="label">Time</span>
			<span id="dashboardTime"></span>
		</div>
	</section>
<div id="setupScreen" class=card>
	<div class="setup-row">
		<label>Game</label>
		<select id="packSelect"></select>
	</div>
	<div class="setup-row">
		<label>Theme</label>
		<select id="themeSelect"></select>
	</div>
	<div id="packInfo" class="pack-info">
		<h3 id="packDescription"></h3>
		<div class="pack-meta">
			<span>
				Version:
				<strong id="packVersion"></strong>
			</span>
			<span>
				Questions:
				<strong id="packQuestions"></strong>
			</span>
			<span>
				Author:
				<strong id="packAuthor"></strong>
			</span>
		</div>
	</div>
	<form id="setupForm">
		Players
		<input id=pcount type=number value=6>
		<button type="button" id="createPlayersBtn">Create</button>
		<div id=plist>
		</div>
		<button type="submit" id="startGameBtn">Start</button>
	</form>
</div>

<main id="gameScreen">

	<div class="game-layout">

		<section class="left-panel">
            <div class="logo-stage">

                <div class="card">

                    <h2>Guess</h2>
					<div class="image-container">
						<img id="guessImage" class="logo-image">
					</div>

                </div>

                <div class="card reveal-card hidden" id="reveal">

                    <h2>Answer</h2>
					<div class="image-container">
						<img id="answerImage" class="logo-image">
					</div>
                    <h3 id="answerText"></h3>

                </div>

            </div>
		</section>

		<aside class="right-panel">

			<div class="panel-title">

				🏆 Scoreboard

			</div>

			<div id="scoreContainer"></div>

		</aside>
	</div>


</main>
</div>
    <div id="gameOverOverlay" class="hidden">
        <div class="overlay-content">
            <div class="overlay-icon">
                🏁
            </div>
            <h2>Final Round Complete</h2>
            <p>Calculating Final Scores...</p>
            <div class="overlay-loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    <canvas id="confettiCanvas" class="hidden"></canvas>
	<div id="winnerScreen" class="hidden">
		<div class="winner-container">
			<h1 id="winnerTitle">
				🏆 GAME OVER
			</h1>
			<div id="podium"></div>
			<div id="winnerStats"></div>
			<button onclick="restartGame()">
				Play Again
			</button>
		</div>
	</div>
	<div id="settingsModal" class="modal hidden">
		<div class="modal-content">
			<div class="modal-header">
				<h2>⚙ Settings</h2>
				<button id="closeSettingsBtn">✕</button>
			</div>
			<div class="modal-body">
				<div class="setting-row">
					<label>
						<input type="checkbox" id="shuffleQuestions">
						Shuffle Questions
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input type="checkbox" id="revealAnimation">
						Reveal Animation
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input type="checkbox" id="showProgressBar">
						Show Progress Bar
					</label>
				</div>
				<div class="setting-row">
					<label>
						<input
								id="soundEnabled"
								type="checkbox">
						Enable Sounds
					</label>
				</div>
				<div class="setting-row">
					<label>
						Points Per Correct Answer
					</label>
					<input
							id="pointsPerCorrect"
							type="number"
							min="1"
							max="100"
							value="5">
				</div>
			</div>
			<div class="modal-footer">
				<button id="saveSettingsBtn">
					Save
				</button>
			</div>
		</div>
	</div>
	<section class="control-card">

		<h3>
			🎮 Game Controls
		</h3>

		<div class="button-bar">
			<div class="left-controls">
				<button class="btn-secondary" id="prevBtn">
					◀ Previous
				</button>
				<button class="btn-success" id="revealBtn">
					👁 Reveal
				</button>
				<button class="btn-primary" id="nextBtn">
					Next ▶
				</button>
			</div>
		</div>

	</section>

	<section class="control-card">
		<h3>
			🖥 Host Tools
		</h3>
		<div class="quick-controls">
			<button id="pauseBtn"> ⏸ Pause </button>
			<button id="muteBtn"> 🔊 Sound </button>
			<button id="shuffleBtn"> 🔀 Shuffle </button>
			<button id="randomBtn"> 🎲 Random </button>
			<button id="skipBtn"> ⏭ Skip </button>
		</div>

	</section>
	<section id="quickControls" class="quick-controls">

	</section>
<script src="js/storage.js"></script>
<script src="js/packManager.js"></script>
<script src="js/themeManager.js"></script>
<script src="gamepacks/logo-pack.js"></script>
<script src="gamepacks/emoji-movie-pack.js"></script>
<script src="gamepacks/pokemon-pack.js"></script>
<script src="js/state.js"></script>
<script src="js/settings.js"></script>
<script src="js/sound.js"></script>
<script src="js/scoreboard.js"></script>
<script src="js/podium.js"></script>
<script src="js/game.js"></script>
<script src="js/keyboard.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/confetti.js"></script>
<script src="js/script.js"></script>
<footer>
	Version 1.4.1.3
</footer>
</body></html>
