<!DOCTYPE html><html><head><meta charset='utf-8'><title>Guess The Logo</title><link rel='stylesheet' href='css/style.css'></head>
<body>
<div class="wrap">
	<header>

		<h1>🎯 Guess The Logo</h1>
		<div id="gameHeader">
			<div class="status-row">
				<span id="questionText"></span>
				<span id="playerCount"></span>
			</div>
			<div class="bar">
				<div class="fill" id="progressBar"></div>
			</div>
		</div>

	</header>

<div id=setup class=card>Players <input id=pcount type=number value=6>
<button onclick="mk()">Create</button>
<div id=plist></div><button onclick="startGame()">Start</button>
</div>

<main id="game">

	<div class="game-layout">

		<section class="left-panel">
            <div class="logo-stage">

                <div class="card">

                    <h2>Guess</h2>
					<div class="image-container">
						<img id="g">
					</div>

                </div>

                <div class="card reveal-card hidden" id="reveal">

                    <h2>Answer</h2>
					<div class="image-container">
						<img id="aimg">
					</div>
                    <h3 id="ans"></h3>

                </div>

            </div>
		</section>

		<aside class="right-panel">

			<div class="panel-title">

				🏆 Scoreboard

			</div>

			<div id="scores"></div>

		</aside>
	</div>

	<div class="button-bar">
		<button onclick="previousQuestion()">
			◀ Previous
		</button>
		<button onclick="revealAnswer()">
			👁 Reveal
		</button>
		<button onclick="nextQuestion()">
			Next ▶
		</button>
		<button id="fullscreenBtn">
			⛶ Fullscreen
		</button>
	</div>
</main>


<script src="js/questions.js"></script>
<script src="js/state.js"></script>
<script src="js/scoreboard.js"></script>
<script src="js/game.js"></script>
<script src="js/script.js"></script>

</body></html>
